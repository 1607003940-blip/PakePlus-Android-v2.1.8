<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>插座数据监测</title>
    <!-- 引入外部样式和脚本 -->
    <link rel="stylesheet" href="css/index.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <h1>插座数据监测系统</h1>
        <div class="time-badge" id="currentTime"></div>
    </header>

    <!-- 主容器 -->
    <div class="container">
        <!-- 左侧主内容区 -->
        <div class="main-content">
            <!-- 实时数据卡片 -->
            <div class="card">
                <div class="card-title">实时监测数据</div>
                <div class="sensor-grid">
                    <div class="sensor-item">
                        <div class="sensor-label">⚡ 电压</div>
                        <div><span class="sensor-value" id="voltage">--</span><span class="sensor-unit">V</span></div>
                    </div>
                    <div class="sensor-item">
                        <div class="sensor-label">🔌 电流</div>
                        <div><span class="sensor-value" id="current">--</span><span class="sensor-unit">mA</span></div>
                    </div>
                    <div class="sensor-item">
                        <div class="sensor-label">💡 功率</div>
                        <div><span class="sensor-value" id="power">--</span><span class="sensor-unit">W</span></div>
                    </div>
                    <div class="sensor-item">
                        <div class="sensor-label">🌡️ 温度</div>
                        <div><span class="sensor-value" id="tem">--</span><span class="sensor-unit">°C</span></div>
                    </div>
                    <div class="sensor-item">
                        <div class="sensor-label">💧 湿度</div>
                        <div><span class="sensor-value" id="humi">--</span><span class="sensor-unit">%RH</span></div>
                    </div>
                    <div class="sensor-item">
                        <div class="sensor-label">🔋 累计用电</div>
                        <div><span class="sensor-value" id="total_energy">--</span><span class="sensor-unit">kWh</span></div>
                    </div>
                </div>
            </div>

            <!-- 设备控制区 -->
            <div class="card">
                <div class="card-title">设备控制</div>
                <div class="device-controls">
                    <div class="switch-container">
                        <span class="switch-label">插座开关</span>
                        <button class="switch-btn" id="socketSwitch" onclick="toggleSocket()"></button>
                    </div>
                    <div class="switch-container">
                        <span class="switch-label">自动模式</span>
                        <button class="switch-btn" id="autoPriceSwitch" onclick="toggleAutoPrice()"></button>
                    </div>
                    <!-- 新增省电开关 -->
                    <div class="switch-container">
                        <span class="switch-label">省电模式</span>
                        <button class="switch-btn" id="lowPowerSwitch" onclick="toggleLowPower()"></button>
                    </div>
                </div>
            </div>

            <!-- 历史数据区 -->
            <div class="card">
                <div class="card-title">历史数据记录</div>
                <div class="history-controls">
                    <!-- 保留24小时和7天快捷按钮 -->
                    <div class="history-time-group" id="historyTimeGroup">
                        <button class="history-time-btn active" data-days="1">24小时</button>
                        <button class="history-time-btn" data-days="7">7天</button>
                    </div>
                    <!-- 新增自定义时间范围输入框 -->
                    <div class="custom-time-group">
                        <input type="datetime-local" id="startTimeInput" class="time-input" placeholder="开始时间">
                        <input type="datetime-local" id="endTimeInput" class="time-input" placeholder="结束时间">
                        <button class="confirm-btn" onclick="queryCustomTimeData()">确定</button>
                    </div>
                    <div class="history-btn-group" id="historyAttrGroup">
                        <button class="history-attr-btn active" data-attr="voltage">电压</button>
                        <button class="history-attr-btn" data-attr="current">电流</button>
                        <button class="history-attr-btn" data-attr="power">功率</button>
                        <button class="history-attr-btn" data-attr="tem">温度</button>
                        <button class="history-attr-btn" data-attr="humi">湿度</button>
                        <button class="history-attr-btn" data-attr="total_energy">累计用电</button>
                    </div>
                </div>
                
                <div class="peak-info" id="peakInfo">
                    <span>📈 峰值:</span> 
                    <span id="peakValue">--</span> 
                    <span id="peakUnit"></span> 
                    出现在 <span id="peakTime">--</span>
                </div>
                
                <div id="historyChart"></div>
                <div id="historyLoading" class="loading" style="display: none;">加载中...</div>
            </div>

            <div id="errorMsg" class="error-msg"></div>
            
            <div class="footer-note">
                数据来自OneNET · 实时刷新 | © 2026 智能插座监测系统
            </div>
        </div>

        <!-- 右侧辅助区（阈值设置） -->
        <div class="sidebar">
            <div class="card">
                <div class="card-title">阈值参数设置</div>
                
                <!-- 电压阈值 -->
                <div class="threshold-item">
                    <div class="threshold-header">
                        <span class="threshold-name">电压阈值</span>
                        <span>
                            <span class="threshold-value-display" id="voltageMaxDisplay">250</span>
                            <span class="threshold-unit">V</span>
                        </span>
                    </div>
                    <div class="slider-with-steps">
                        <button class="step-btn" onclick="decrementVoltageMax()">-</button>
                        <input type="range" class="slider" id="voltageMaxSlider" min="0" max="500" step="0.1" value="250" oninput="syncVoltageMaxFromSlider()">
                        <button class="step-btn" onclick="incrementVoltageMax()">+</button>
                    </div>
                    <div class="input-group">
                        <input type="number" id="voltageMaxInput" min="0" max="500" step="0.1" value="250" oninput="syncVoltageMaxFromInput()">
                        <button id="voltageMaxSetBtn" onclick="setVoltageMax()">设置</button>
                    </div>
                </div>

                <!-- 电流阈值 -->
                <div class="threshold-item">
                    <div class="threshold-header">
                        <span class="threshold-name">电流阈值</span>
                        <span>
                            <span class="threshold-value-display" id="currentMaxDisplay">5000</span>
                            <span class="threshold-unit">mA</span>
                        </span>
                    </div>
                    <div class="slider-with-steps">
                        <button class="step-btn" onclick="decrementCurrentMax()">-</button>
                        <input type="range" class="slider" id="currentMaxSlider" min="0" max="50000" step="1" value="5000" oninput="syncCurrentMaxFromSlider()">
                        <button class="step-btn" onclick="incrementCurrentMax()">+</button>
                    </div>
                    <div class="input-group">
                        <input type="number" id="currentMaxInput" min="0" max="50000" step="1" value="5000" oninput="syncCurrentMaxFromInput()">
                        <button id="currentMaxSetBtn" onclick="setCurrentMax()">设置</button>
                    </div>
                </div>

                <!-- 功率阈值 -->
                <div class="threshold-item">
                    <div class="threshold-header">
                        <span class="threshold-name">功率阈值</span>
                        <span>
                            <span class="threshold-value-display" id="powerMaxDisplay">600</span>
                            <span class="threshold-unit">W</span>
                        </span>
                    </div>
                    <div class="slider-with-steps">
                        <button class="step-btn" onclick="decrementPowerMax()">-</button>
                        <input type="range" class="slider" id="powerMaxSlider" min="0" max="5000" step="0.1" value="600" oninput="syncPowerMaxFromSlider()">
                        <button class="step-btn" onclick="incrementPowerMax()">+</button>
                    </div>
                    <div class="input-group">
                        <input type="number" id="powerMaxInput" min="0" max="5000" step="0.1" value="600" oninput="syncPowerMaxFromInput()">
                        <button id="powerMaxSetBtn" onclick="setPowerMax()">设置</button>
                    </div>
                </div>

                <!-- 电价设置 -->
                <div class="threshold-item">
                    <div class="threshold-header">
                        <span class="threshold-name">当前电价</span>
                        <span>
                            <span class="threshold-value-display" id="currentPriceDisplay">0.55</span>
                            <span class="threshold-unit">元</span>
                        </span>
                    </div>
                    <div class="slider-with-steps">
                        <button class="step-btn" onclick="decrementCurrentPrice()">-</button>
                        <input type="range" class="slider" id="currentPriceSlider" min="0" max="10" step="0.01" value="0.55" oninput="syncCurrentPriceFromSlider()">
                        <button class="step-btn" onclick="incrementCurrentPrice()">+</button>
                    </div>
                    <div class="input-group">
                        <input type="number" id="currentPriceInput" min="0" max="10" step="0.01" value="0.55" oninput="syncCurrentPriceFromInput()">
                        <button id="currentPriceSetBtn" onclick="setCurrentPrice()">设置</button>
                    </div>
                </div>

                <!-- 需求电价阈值 -->
                <div class="threshold-item">
                    <div class="threshold-header">
                        <span class="threshold-name">需求电价阈值</span>
                        <span>
                            <span class="threshold-value-display" id="priceThresholdDisplay">0.00</span>
                            <span class="threshold-unit">元</span>
                        </span>
                    </div>
                    <div class="slider-with-steps">
                        <button class="step-btn" onclick="decrementPriceThreshold()">-</button>
                        <input type="range" class="slider" id="priceThresholdSlider" min="0" max="10" step="0.01" value="0" oninput="syncPriceThresholdFromSlider()">
                        <button class="step-btn" onclick="incrementPriceThreshold()">+</button>
                    </div>
                    <div class="input-group">
                        <input type="number" id="priceThresholdInput" min="0" max="10" step="0.01" value="0" oninput="syncPriceThresholdFromInput()">
                        <button id="priceThresholdSetBtn" onclick="setPriceThreshold()">设置</button>
                    </div>
                </div>

                <!-- 新增：低功率阈值 -->
                <div class="threshold-item">
                    <div class="threshold-header">
                        <span class="threshold-name">低功率阈值</span>
                        <span>
                            <span class="threshold-value-display" id="powerLowThresholdDisplay">1.0</span>
                            <span class="threshold-unit">W</span>
                        </span>
                    </div>
                    <div class="slider-with-steps">
                        <button class="step-btn" onclick="decrementPowerLowThreshold()">-</button>
                        <input type="range" class="slider" id="powerLowThresholdSlider" min="1" max="2000" step="0.1" value="1" oninput="syncPowerLowThresholdFromSlider()">
                        <button class="step-btn" onclick="incrementPowerLowThreshold()">+</button>
                    </div>
                    <div class="input-group">
                        <input type="number" id="powerLowThresholdInput" min="1" max="2000" step="0.1" value="1" oninput="syncPowerLowThresholdFromInput()">
                        <button id="powerLowThresholdSetBtn" onclick="setPowerLowThreshold()">设置</button>
                    </div>
                </div>

                <!-- 新增：低功率持续时间 -->
                <div class="threshold-item">
                    <div class="threshold-header">
                        <span class="threshold-name">低功率持续时间</span>
                        <span>
                            <span class="threshold-value-display" id="lowPowerDurationDisplay">60</span>
                            <span class="threshold-unit">秒</span>
                        </span>
                    </div>
                    <div class="slider-with-steps">
                        <button class="step-btn" onclick="decrementLowPowerDuration()">-</button>
                        <input type="range" class="slider" id="lowPowerDurationSlider" min="1" max="1200" step="1" value="60" oninput="syncLowPowerDurationFromSlider()">
                        <button class="step-btn" onclick="incrementLowPowerDuration()">+</button>
                    </div>
                    <div class="input-group">
                        <input type="number" id="lowPowerDurationInput" min="1" max="1200" step="1" value="60" oninput="syncLowPowerDurationFromInput()">
                        <button id="lowPowerDurationSetBtn" onclick="setLowPowerDuration()">设置</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入外部JS -->
    <script src="js/index.js"></script>
</body>
</html>
